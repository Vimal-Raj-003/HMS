version: '3.8'

services:
  backend:
    build:
      context: ./backend
      target: production
    image: hms-backend:latest
    container_name: hms-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-refresh-secret}
      - PORT=5000
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000,https://hms-ten-indol.vercel.app}
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

